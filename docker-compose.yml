version: '3.8'

services:
  postgres_db:
    image: postgres:15-alpine
    container_name: quiz_postgres_db
    environment:
      POSTGRES_USER: quiz_user
      POSTGRES_PASSWORD: quiz_password
      POSTGRES_DB: quiz_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quiz_user -d quiz_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend_api:
    build:
      context: .
      target: runner
    container_name: fastapi_backend_app
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://quiz_user:quiz_password@postgres_db:5432/quiz_db
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    depends_on:
      postgres_db:
        condition: service_healthy

volumes:
  postgres_data:
