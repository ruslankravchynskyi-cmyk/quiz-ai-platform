version: '3.8'

services:
  quiz_postgres_db:
    image: postgres:15
    environment:
      POSTGRES_USER: quiz_user
      POSTGRES_PASSWORD: quiz_password
      POSTGRES_DB: quiz_db
    ports:
      - "5432:5432"

  fastapi_backend_app:
    build: .
    ports:
      - "8000:8000"


    depends_on:
      - quiz_postgres_db